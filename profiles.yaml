profiles:
  # Shipped WLAN baselines. Ready to use as-is, but adjust them if your
  # environment, client mix, or security policy needs something different.
  # Available presets: Standard, IoT, Hotspot, Throughput, Latency
  #
  # Profile field guide:
  # - wifi_bands: expected WLAN bands (2g, 5g)
  # - security_protocols: allowed security modes for a matching WLAN
  # - fast_roaming, mlo, bss_transition, uapsd, proxy_arp, multicast_*,
  #   pmf, hide_wifi_name, client_device_isolation, ap_name_in_beacon:
  #   controller settings compared directly against the WLAN
  # - minrate_mode: auto or manual
  # - dtim_mode: default or custom
  # - minrate_*: expected values when minrate_mode is manual
  # - dtim_*: expected values when dtim_mode is custom
  # - group_rekey: always checked
  # - sae_*: checked when the WLAN uses a SAE-based security protocol

  # Baseline matching the current UniFi "Standard/Auto" 2.4/5 GHz WLAN behavior.
  Standard:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: false
    minrate_mode: auto
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: false
    security_protocols:
      - WPA2
    pmf: Disabled
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 5
    sae_sync_time: 5
    mlo: false
    bss_transition: true
    uapsd: false
    dtim_mode: default
    group_rekey: 0
    ap_name_in_beacon: false

  # Baseline matching the current UniFi "IoT/Auto" 2.4 GHz WLAN behavior.
  IoT:
    wifi_bands:
      - 2g
    fast_roaming: false
    minrate_mode: auto
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: false
    security_protocols:
      - WPA2
    pmf: Disabled
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 5
    sae_sync_time: 5
    mlo: false
    bss_transition: false
    uapsd: false
    dtim_mode: default
    group_rekey: 0
    ap_name_in_beacon: false

  # Public hotspot baseline, close to UniFi defaults with guest isolation.
  Hotspot:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: false
    minrate_mode: auto
    multicast_broadcast_blocker: true
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - Open
    pmf: Disabled
    hide_wifi_name: false
    client_device_isolation: true
    sae_anti_clogging: 5
    sae_sync_time: 5
    mlo: false
    bss_transition: true
    uapsd: false
    dtim_mode: default
    group_rekey: 0
    ap_name_in_beacon: false

  # Throughput-oriented baseline for primary client WLANs on 2.4/5 GHz.
  Throughput:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: true
    minrate_mode: manual
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
      - WPA2/WPA3 Enterprise
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 10
    sae_sync_time: 5
    mlo: false
    bss_transition: true
    uapsd: false
    dtim_mode: custom
    dtim_24: 3
    dtim_5: 3
    group_rekey: 3600
    ap_name_in_beacon: false

  # Latency-oriented baseline for primary client WLANs on 2.4/5 GHz.
  Latency:
    wifi_bands:
      - 2g
      - 5g
    fast_roaming: true
    minrate_mode: manual
    minrate_24_kbps: 11000
    minrate_5_kbps: 24000
    multicast_broadcast_blocker: false
    multicast_to_unicast: false
    proxy_arp: true
    security_protocols:
      - WPA2/WPA3
      - WPA2/WPA3 Enterprise
    pmf: Optional
    hide_wifi_name: false
    client_device_isolation: false
    sae_anti_clogging: 10
    sae_sync_time: 5
    mlo: false
    bss_transition: true
    uapsd: true
    dtim_mode: custom
    dtim_24: 1
    dtim_5: 1
    group_rekey: 3600
    ap_name_in_beacon: false
